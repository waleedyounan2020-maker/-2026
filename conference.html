<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف اشتراكات المؤتمر</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --primary: #1a3a5c; --gold: #c8972a; --cream: #f8f6f0; }
  body { font-family: 'Amiri', serif; background: var(--cream); margin: 0; padding: 0; }
  .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
  .status-bar { text-align: center; padding: 10px; font-weight: bold; background: white; border-bottom: 1px solid #ccc; min-height: 40px; }
  .status-bar.saving { color: orange; }
  .status-bar.saved { color: green; }
  .status-bar.error { color: red; }
  .table-wrap { padding: 20px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: white; }
  th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
  th { background: var(--primary); color: white; }
  input { width: 90%; border: none; outline: none; font-family: 'Amiri', serif; font-size: 1rem; }
  .loading { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 100; }
</style>
</head>
<body>

<div id="loading" class="loading">جاري تحميل البيانات...</div>

<div class="header">
  <h2>✞ كنيسة مارجرجس قليوب البلد </h2>
  <p>كشف اشتراكات المؤتمر</p>
</div>

<div class="status-bar" id="status"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>م</th>
        <th>الاسم</th>
        <th>الخادم</th>
        <th>نقدي</th>
        <th>انستا</th>
        <th>خصم</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
// --- البيانات الأساسية (تم تنظيفها تماماً) ---
const S_URL = 'https://lykmghvlqfpdrdezeozn.supabase.co'; 
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5a21naHZscWZwZHJkZXplb3puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjI5ODgsImV4cCI6MjA5MjQ5ODk4OH0.0BOQAyMbQIVkjb5uXEfIzphAveV45GiurNTAxYmvLOM';
const TABLE = 'conference_sheets';
const KEY_VAL = 'conference_2026';

let rows = Array.from({length: 60}, (_, i) => ({num: i+1, name: '', servant: '', naqdi: 0, insta: 0, khasm: 0}));
let timer = null;

async function loadData() {
  try {
    const r = await fetch(`${S_URL}/rest/v1/${TABLE}?sheet_key=eq.${KEY_VAL}&select=data`, {
      headers: { 'apikey': S_KEY, 'Authorization': `Bearer ${S_KEY}` }
    });
    const d = await r.json();
    if (d && d[0]) rows = d[0].data;
  } catch (e) { console.error("Load Error"); }
  render();
  document.getElementById('loading').style.display = 'none';
}

async function saveData() {
  document.getElementById('status').className = 'status-bar saving';
  document.getElementById('status').textContent = '⏳ جاري الحفظ...';
  
  try {
    const r = await fetch(`${S_URL}/rest/v1/${TABLE}?sheet_key=eq.${KEY_VAL}`, {
      method: 'PATCH',
      headers: { 
        'apikey': S_KEY, 
        'Authorization': `Bearer ${S_KEY}`, 
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal' 
      },
      body: JSON.stringify({ data: rows, updated_at: new Date() })
    });

    if (r.ok) {
      document.getElementById('status').className = 'status-bar saved';
      document.getElementById('status').textContent = '✅ تم الحفظ بنجاح';
    } else {
      throw new Error();
    }
  } catch (e) {
    document.getElementById('status').className = 'status-bar error';
    document.getElementById('status').textContent = '❌ فشل الحفظ - تأكد من الـ SQL Editor';
  }
}

function render() {
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  rows.forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.num}</td>
      <td><input value="${row.name}" oninput="update(${i},'name',this.value)"></td>
      <td><input value="${row.servant}" oninput="update(${i},'servant',this.value)"></td>
      <td><input type="number" value="${row.naqdi}" oninput="update(${i},'naqdi',this.value)"></td>
      <td><input type="number" value="${row.insta}" oninput="update(${i},'insta',this.value)"></td>
      <td><input type="number" value="${row.khasm}" oninput="update(${i},'khasm',this.value)"></td>
    `;
    tb.appendChild(tr);
  });
}

function update(i, col, val) {
  rows[i][col] = (col === 'name' || col === 'servant') ? val : Number(val);
  clearTimeout(timer);
  timer = setTimeout(saveData, 1000);
}

loadData();
</script>
</body>
</html>
