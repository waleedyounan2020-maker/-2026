<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف اشتراكات مؤتمر شباب وإعداد خدام</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a3a5c; --primary-light: #2e6da4; --primary-pale: #d6e8f7;
    --gold: #c8972a; --gold-light: #e8b84b; --gold-pale: #fef9ed;
    --cream: #f8f6f0; --dark: #1a1a2e; --gray: #6b7280;
    --green: #16a34a; --red: #dc2626; --border: #d1d5db;
    --success: #dcfce7; --danger: #fee2e2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Amiri', serif; background: var(--cream); color: var(--dark); min-height: 100vh; }
  .header { background: linear-gradient(135deg, var(--primary) 0%, #0f2540 100%); color: white; padding: 24px 20px 20px; text-align: center; position: relative; overflow: hidden; }
  .church-name { font-family: 'Scheherazade New', serif; font-size: 1rem; color: var(--gold-light); opacity: 0.9; margin-bottom: 6px; }
  .conf-title { font-family: 'Scheherazade New', serif; font-size: 1.8rem; font-weight: 700; color: white; line-height: 1.3; }
  .status-bar { text-align: center; padding: 6px; font-size: 0.82rem; min-height: 28px; background: white; border-bottom: 1px solid var(--border); }
  .status-bar.saving { color: #d97706; }
  .status-bar.saved { color: var(--green); }
  .status-bar.error { color: var(--red); }
  .summary { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; padding: 16px; background: white; border-bottom: 1px solid var(--border); }
  .sum-card { background: var(--cream); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; text-align: center; min-width: 110px; }
  .sum-num { font-family: 'Scheherazade New', serif; font-size: 1.6rem; font-weight: 700; color: var(--primary); }
  .table-wrap { overflow-x: auto; padding: 16px; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  thead tr { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); }
  thead th { padding: 12px 8px; font-family: 'Scheherazade New', serif; font-size: 0.9rem; color: white; text-align: center; font-weight: 700; }
  tbody tr { border-bottom: 1px solid #f0f0f0; }
  td { padding: 6px 5px; text-align: center; }
  .name-input { width: 100%; border: none; background: transparent; font-family: 'Amiri', serif; font-size: 0.95rem; text-align: right; outline: none; }
  .num-input { width: 75px; border: 1px solid transparent; background: transparent; text-align: center; outline: none; }
  .loading-overlay { position: fixed; inset: 0; background: rgba(248,246,240,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
  .price-note { text-align: center; background: var(--gold-pale); border: 1px solid #fcd34d; border-radius: 8px; margin: 10px 16px; padding: 8px; font-size: 0.85rem; color: var(--gold); }
  .calc-cell { font-family: 'Scheherazade New', serif; font-weight: 700; }
  .remaining-positive { color: var(--red); }
  .remaining-zero { color: var(--green); }
</style>
</head>
<body>

<div id="loading-overlay" class="loading-overlay">
  <div class="spinner" style="width:40px;height:40px;border:3px solid #ccc;border-top-color:#1a3a5c;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  <p style="margin-top:10px; font-family:'Amiri',serif;">جارى تحميل البيانات...</p>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<div class="header">
  <div class="church-name">✞ كنيسة الشهيد العظيم مارجرجس قليوب البلد ✞</div>
  <div class="conf-title">كشف اشتراكات مؤتمر شباب وإعداد خدام</div>
  <div class="conf-date">📅 الأيام ١٧ - ١٨ - ١٩ من شهر سبتمبر</div>
  <div style="margin-top:10px">
    <button id="admin-btn" onclick="toggleAdmin()" style="background:transparent;border:1.5px solid rgba(255,255,255,0.4);color:white;padding:5px 15px;border-radius:15px;cursor:pointer;">🔐 دخول كأدمن</button>
  </div>
</div>

<div class="status-bar" id="status-bar"></div>

<div class="summary">
  <div class="sum-card"><div class="sum-num" id="sum-count">0</div><div class="sum-label">عدد المشتركين</div></div>
  <div class="sum-card"><div class="sum-num" id="sum-total">0</div><div class="sum-label">إجمالي المحصل</div></div>
  <div class="sum-card" style="background:#fee2e2"><div class="sum-num" id="sum-remaining" style="color:#dc2626">0</div><div class="sum-label">إجمالي المتبقي</div></div>
</div>

<div class="price-note">💰 سعر الاشتراك الأساسي: 1000 جنيه للفرد</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>م</th>
        <th style="text-align:right">الاسم</th>
        <th style="text-align:right">الخادم</th>
        <th>نقدي</th>
        <th>انستا</th>
        <th>خصم</th>
        <th>الإجمالي</th>
        <th>المتبقي</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
// البيانات الصحيحة بناءً على رسالتك
const SUPABASE_URL = 'https://lykmghvlqfpdrdezeozn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5a21naHZscWZwZHJkZXplb3puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjI5ODgsImV4cCI6MjA5MjQ5ODk4OH0.0BOQAyMbQIVkjb5uXEfIzphAveV45GiurNTAxYmvLOM';
const H = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };

const TOTAL_ROWS = 60;
const BASE_PRICE = 1000;
const TABLE_KEY = 'conference_2026';
let isAdmin = false;
let rows = [];
let saveTimer = null;

async function loadData() {
  rows = Array.from({length: TOTAL_ROWS}, (_,i) => ({num: i+1, name:'', servant:'', naqdi:0, insta:0, khasm:0}));
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/conference_sheets?sheet_key=eq.${TABLE_KEY}&select=data`, { headers: H });
    const res = await r.json();
    if (res && res[0]) {
      res[0].data.forEach((saved, i) => { if (i < TOTAL_ROWS) rows[i] = {...rows[i], ...saved}; });
    }
  } catch(e) { console.error('Load error:', e); }
}

async function saveData() {
  setStatus('saving', '💾 جارى الحفظ...');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/conference_sheets`, {
      method: 'POST',
      headers: { ...H, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ sheet_key: TABLE_KEY, data: rows, updated_at: new Date().toISOString() })
    });
    if (!res.ok) {
      await fetch(`${SUPABASE_URL}/rest/v1/conference_sheets?sheet_key=eq.${TABLE_KEY}`, {
        method: 'PATCH',
        headers: H,
        body: JSON.stringify({ data: rows, updated_at: new Date().toISOString() })
      });
    }
    setStatus('saved', '✅ تم الحفظ تلقائياً');
    setTimeout(() => setStatus('', ''), 2000);
  } catch(e) { setStatus('error', '❌ خطأ في الاتصال بقاعدة البيانات'); }
}

function setStatus(cls, msg) {
  const el = document.getElementById('status-bar');
  el.className = 'status-bar ' + cls;
  el.textContent = msg;
}

function buildTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.num}</td>
      <td><input type="text" class="name-input" value="${row.name||''}" oninput="updateVal(${i},'name',this.value)"></td>
      <td><input type="text" class="name-input" value="${row.servant||''}" oninput="updateVal(${i},'servant',this.value)"></td>
      <td><input type="number" class="num-input" value="${row.naqdi||0}" oninput="updateVal(${i},'naqdi',this.value)"></td>
      <td><input type="number" class="num-input" value="${row.insta||0}" oninput="updateVal(${i},'insta',this.value)"></td>
      <td><input type="number" class="num-input" value="${row.khasm||0}" oninput="updateVal(${i},'khasm',this.value)"></td>
      <td id="total-${i}" class="calc-cell">0</td>
      <td id="rem-${i}" class="calc-cell">0</td>
    `;
    tbody.appendChild(tr);
    updateRowUI(i);
  });
  updateSummary();
}

function updateVal(i, key, val) {
  rows[i][key] = (key === 'name' || key === 'servant') ? val : parseFloat(val) || 0;
  updateRowUI(i);
  updateSummary();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 1500);
}

function updateRowUI(i) {
  const r = rows[i];
  const total = (r.naqdi||0) + (r.insta||0);
  const rem = BASE_PRICE - (r.khasm||0) - total;
  document.getElementById('total-'+i).textContent = total;
  const remTd = document.getElementById('rem-'+i);
  remTd.textContent = rem;
  remTd.className = 'calc-cell ' + (rem <= 0 ? 'remaining-zero' : 'remaining-positive');
}

function updateSummary() {
  const filled = rows.filter(r => r.name);
  const totalCollected = rows.reduce((s,r) => s + (r.naqdi||0) + (r.insta||0), 0);
  const totalRem = filled.reduce((s,r) => s + Math.max(0, BASE_PRICE - (r.khasm||0) - (r.naqdi||0) - (r.insta||0)), 0);
  document.getElementById('sum-count').textContent = filled.length;
  document.getElementById('sum-total').textContent = totalCollected;
  document.getElementById('sum-remaining').textContent = totalRem;
}

function toggleAdmin() {
  const p = prompt('كلمة السر:');
  if(p === 'Waleed2026') { isAdmin = true; alert('أهلاً يا أدمن'); }
}

(async () => {
  await loadData();
  buildTable();
  document.getElementById('loading-overlay').style.display = 'none';
})();
</script>
</body>
</html>
