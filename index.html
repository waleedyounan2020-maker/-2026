<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كشف اشتراكات المؤتمر</title>
    <style>
        body { font-family: sans-serif; direction: rtl; padding: 20px; background: #f8f6f0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a3a5c; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #1a3a5c; color: white; }
        input { width: 90%; border: 1px solid #eee; padding: 5px; text-align: center; font-size: 1rem; }
        .status { text-align: center; padding: 10px; font-weight: bold; margin-bottom: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>✞ كشف اشتراكات المؤتمر 2026</h2>
    <div id="status" class="status">جاري التحميل...</div>
    <table>
        <thead>
            <tr>
                <th>م</th>
                <th>الاسم</th>
                <th>الخادم المسئول</th>
                <th>نقدي + انستا</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>
const S_URL = 'https://lykmghvlqfpdrdezeozn.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5a21naHZscWZwZHJkZXplb3puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjI5ODgsImV4cCI6MjA5MjQ5ODk4OH0.0BOQAyMbQIVkjb5uXEfIzphAveV45GiurNTAxYmvLOM';

let rows = Array.from({length: 40}, (_, i) => ({id: i+1, name: '', servant: '', total: 0}));

async function load() {
    try {
        const res = await fetch(`${S_URL}/rest/v1/conference_sheets?sheet_key=eq.conference_2026&select=data`, {
            headers: { 'apikey': S_KEY, 'Authorization': `Bearer ${S_KEY}` }
        });
        const json = await res.json();
        if (json && json[0]) rows = json[0].data;
        updateStatus('✅ متصل وقابل للحفظ', 'success');
    } catch (e) {
        updateStatus('❌ فشل الاتصال بالسيرفر', 'error');
    }
    render();
}

async function save() {
    updateStatus('⏳ جاري الحفظ...', '');
    try {
        const res = await fetch(`${S_URL}/rest/v1/conference_sheets?sheet_key=eq.conference_2026`, {
            method: 'PATCH',
            headers: { 
                'apikey': S_KEY, 
                'Authorization': `Bearer ${S_KEY}`, 
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({ data: rows, updated_at: new Date() })
        });
        if (res.ok) updateStatus('✅ تم الحفظ بنجاح في قاعدة البيانات', 'success');
        else throw new Error();
    } catch (e) {
        updateStatus('❌ فشل الحفظ - تأكد من الـ SQL Editor', 'error');
    }
}

function render() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = rows.map((r, i) => `
        <tr>
            <td>${r.id}</td>
            <td><input value="${r.name||''}" onchange="update(${i}, 'name', this.value)"></td>
            <td><input value="${r.servant||''}" onchange="update(${i}, 'servant', this.value)"></td>
            <td><input type="number" value="${r.total||0}" onchange="update(${i}, 'total', this.value)"></td>
        </tr>
    `).join('');
    document.getElementById('status').style.display = 'block';
    document.getElementById('status').previousElementSibling ? '' : ''; // dummy
}

function update(i, col, val) {
    rows[i][col] = val;
    save();
}

function updateStatus(msg, cls) {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.className = 'status ' + cls;
}

load();
</script>
</body>
</html>
